<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Navigator</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: black;
  color: white;
}

/* CAMERA */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* GLASS */
.glass {
  backdrop-filter: blur(25px) saturate(180%);
  background: rgba(20,20,30,0.35);
  border-radius: 25px;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 30px rgba(0,0,0,0.6);
}

/* SCREEN SYSTEM */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.active {
  display: block;
}

/* TOP SEGMENT */
.segment {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  padding: 6px;
}

.segment div {
  padding: 6px 12px;
  border-radius: 15px;
  font-size: 12px;
  opacity: 0.6;
}

.segment .active-tab {
  background: rgba(255,255,255,0.2);
  opacity: 1;
}

/* DESTINATION CARD */
.dest {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 18px;
  text-align: center;
}

/* CATEGORY BAR */
.categories {
  position: absolute;
  top: 150px;
  width: 100%;
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 0 10px;
}

.cat {
  padding: 10px 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  white-space: nowrap;
}

.cat.active {
  background: rgba(255,0,0,0.7);
}

/* COMPASS BIG */
.big-compass {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
  display: flex;
  align-items: center;
  justify-content: center;
}

.needle {
  width: 6px;
  height: 80px;
  background: red;
  transform-origin: bottom;
}

/* AR PATH */
.path {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.arrow {
  width: 40px;
  height: 40px;
  margin: 10px;
  background: red;
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  animation: flow 1.2s infinite;
  filter: drop-shadow(0 0 10px red);
}

@keyframes flow {
  0% { transform: translateY(50px); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-50px); opacity: 0; }
}

/* SMALL COMPASS */
.small-compass {
  position: absolute;
  bottom: 120px;
  left: 20px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BOTTOM CARD */
.bottom {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 20px;
  text-align: center;
}

/* MAP */
.map {
  width: 100%;
  height: 100%;
  background: linear-gradient(#1a1a2e, #16213e);
}

/* NAV BUTTONS */
.nav {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.nav button {
  padding: 10px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">
  <div class="segment glass">
    <div class="active-tab">Explorer</div>
    <div>Historic</div>
    <div>Easy</div>
  </div>

  <div class="dest glass">
    Chinatown - 인천 차이나타운<br>
    <span id="dist1">--m</span>
  </div>

  <div class="categories">
    <div class="cat">Chinatown</div>
    <div class="cat">Performance</div>
    <div class="cat active">Costume</div>
    <div class="cat">River</div>
  </div>

  <div class="big-compass">
    <div class="needle" id="needle1"></div>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
  <div class="dest glass">AR Navigation</div>

  <div class="path" id="path"></div>

  <div class="small-compass">
    <div class="needle" id="needle2"></div>
  </div>

  <div class="bottom glass">
    <div id="instruction">Loading...</div>
  </div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="screen3">
  <div class="map"></div>
  <div class="bottom glass">Route Overview (Mock)</div>
</div>

<div class="nav">
  <button onclick="show(1)">Compass</button>
  <button onclick="show(2)">AR</button>
  <button onclick="show(3)">Map</button>
</div>

<script>
// CAMERA
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>camera.srcObject=s);

// DEST
const DEST={lat:37.4740,lon:126.6167};
let lat=0,lon=0,heading=0;

// GPS
navigator.geolocation.watchPosition(p=>{
 lat=p.coords.latitude;
 lon=p.coords.longitude;
 let d=dist(lat,lon,DEST.lat,DEST.lon);
 dist1.innerText=Math.round(d)+"m";
});

// COMPASS
document.body.onclick=()=>{
 if(DeviceOrientationEvent.requestPermission){
   DeviceOrientationEvent.requestPermission().then(r=>{
     if(r==='granted') start();
   });
 } else start();
};

function start(){
 window.addEventListener("deviceorientation",e=>{
  heading=e.webkitCompassHeading||(360-e.alpha);
  update();
 });
}

// UPDATE
function update(){
 let b=bearing(lat,lon,DEST.lat,DEST.lon);
 let diff=b-heading;

 needle1.style.transform=`rotate(${heading}deg)`;
 needle2.style.transform=`rotate(${heading}deg)`;
 path.style.transform=`rotate(${diff}deg)`;

 instruction.innerText =
   diff>20?"Turn right":
   diff<-20?"Turn left":"Go straight";
}

// PATH
for(let i=0;i<7;i++){
 let a=document.createElement("div");
 a.className="arrow";
 path.appendChild(a);
}

// NAV
function show(n){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById("screen"+n).classList.add("active");
}

// MATH
function dist(a,b,c,d){
 let R=6371e3;
 let φ1=a*Math.PI/180,φ2=c*Math.PI/180;
 let Δφ=(c-a)*Math.PI/180,Δλ=(d-b)*Math.PI/180;
 let x=Math.sin(Δφ/2)**2+
 Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function bearing(a,b,c,d){
 let φ1=a*Math.PI/180,φ2=c*Math.PI/180;
 let λ1=b*Math.PI/180,λ2=d*Math.PI/180;
 let y=Math.sin(λ2-λ1)*Math.cos(φ2);
 let x=Math.cos(φ1)*Math.sin(φ2)-
 Math.sin(φ1)*Math.cos(φ2)*Math.cos(λ2-λ1);
 return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
</script>

</body>
</html>
